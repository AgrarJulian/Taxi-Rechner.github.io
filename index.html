<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiRechner | Taxi Köln</title>
    <style>
        :root {
            --taxi-yellow: #ffcc00;
            --taxi-black: #121212;
            --taxi-dark-gray: #1e1e1e;
            --taxi-deep-black: #000000;
            --text-light: #ffffff;
            --text-dark: #000000;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--taxi-black);
            color: var(--text-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-bottom: 150px;
        }

        .main-content {
            display: flex;
            justify-content: center;
            padding: 20px;
            flex-grow: 1;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background-color: var(--taxi-dark-gray);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #333;
        }

        /* Angepasster Header für das volle Banner-Bild */
        .header-bar {
            background-color: var(--taxi-yellow);
            color: var(--text-dark);
            /* Kein padding oben/unten, damit das Bild den Rand berührt */
            padding: 0; 
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Ermöglicht, dass das Bild über den Rand geht, falls gewünscht */
            overflow: visible; 
        }

        .logo-image {
            /* Das Bild füllt die Breite des Headers aus */
            width: 100%; 
            /* WICHTIG: Die Höhe passt sich automatisch an das Originalbild an */
            height: auto; 
            /* Verhindert das Bescheiden des Kreises */
            border-radius: 0; 
            /* Verhindert Verzerrung */
            object-fit: cover; 
            margin: 0;
            /* Entfernt die Ränder, die wir vorher hatten */
            border: none; 
            background-color: transparent; 
        }

        /* Da das Banner-Bild nun den Text "Taxi Köln" enthält, 
           blenden wir die HTML-Überschrift <h1> hier aus */
        .header-bar h1 {
            display: none;
        }

        .content {
            padding: 30px;
        }

        .footer-bar {
            background-color: var(--taxi-deep-black);
            color: var(--taxi-yellow);
            padding: 15px 30px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            position: absolute;
            bottom: 0;
            box-sizing: border-box;
            z-index: 50;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--taxi-yellow);
            font-weight: bold;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .checkbox-container {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 15px;
        }

        .checkbox-item input {
            width: auto;
            margin-right: 12px;
        }

        #invoice {
            margin-top: 30px;
            background: white;
            color: black;
            padding: 40px;
            border-radius: 4px;
        }

        .invoice-head {
            display: flex;
            justify-content: space-between;
            border-bottom: 4px solid var(--taxi-yellow);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .invoice-table {
            width: 100%;
            border-collapse: collapse;
        }

        .invoice-table th {
            text-align: left;
            border-bottom: 2px solid #ddd;
            padding: 10px;
        }

        .invoice-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
        }

        .total-box {
            margin-top: 25px;
            background: var(--taxi-yellow);
            padding: 15px;
            text-align: right;
            font-size: 24px;
            font-weight: bold;
            border-radius: 4px;
        }

        .btn-print {
            background: var(--taxi-yellow);
            color: black;
            border: none;
            padding: 18px;
            width: 100%;
            font-weight: bold;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-print:hover {
            background: #ffffff;
            box-shadow: 0 0 15px var(--taxi-yellow);
        }

        .feedback-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: var(--taxi-yellow);
            color: black;
            padding: 14px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .feedback-btn:hover {
            transform: translateY(-5px);
            background-color: #fff;
        }

        @media print {
            .no-print, .feedback-btn, .footer-bar { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; max-width: 100%; }
            #invoice { margin: 0; border: 1px solid #eee; }
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="main-content">
    <div class="container">
        <div class="header-bar no-print">
            <img src="images/logo.png" alt="Taxi Köln Banner" class="logo-image">
            <h1>TaxiRechner Köln</h1> 
        </div>

        <div class="content">
            <div class="no-print">
                <div class="grid">
                    <div class="input-group">
                        <label>Fahrzeugmodell</label>
                        <select id="car" onchange="calc()">
                            <option value="s-klasse">Extended S-Klasse</option>
                            <option value="stretch">Stretch-Limousine</option>
                            <option value="patriot">Patriot Limousine</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Fahrt-Modus</label>
                        <select id="type" onchange="calc()">
                            <option value="0">Einfache Fahrt</option>
                            <option value="1">Hin- und Rückfahrt</option>
                            <option value="2">1 Stunde exklusiv</option>
                        </select>
                    </div>
                </div>

                <div class="grid">
                    <div class="input-group">
                        <label>Zusatzzeit (Einheit: 15 Min)</label>
                        <input type="number" id="time" value="0" min="0" oninput="calc()">
                    </div>
                    <div class="input-group">
                        <label>Zusatz-Stopps (ab 4. Ziel)</label>
                        <input type="number" id="stops" value="0" min="0" oninput="calc()">
                    </div>
                </div>

                <label>Zusatzoptionen & Aufschläge</label>
                <div class="checkbox-container">
                    <label class="checkbox-item"><input type="checkbox" id="outside" onchange="calc()"> Außerhalb Kerngebiet (Pauschal)</label>
                    <label class="checkbox-item"><input type="checkbox" id="spontan" onchange="calc()"> Spontanbuchung (&lt; 3 Std. Vorlauf)</label>
                    <label class="checkbox-item"><input type="checkbox" id="kolonne" onchange="calc()"> Kolonnen- / Formationsfahrt (+20%)</label>
                </div>

                <button class="btn-print" onclick="window.print()">Rechnung erstellen & Drucken</button>
            </div>

            <div id="invoice">
                <div class="invoice-head">
                    <div>
                        <strong style="font-size: 22px;">TaxiRechner Köln</strong><br>
                        Chauffeur- & Limousinenservice
                    </div>
                    <div style="text-align: right;">
                        <strong style="font-size: 24px;">RECHNUNG</strong><br>
                        Datum: <span id="date">--.--.----</span>
                    </div>
                </div>

                <table class="invoice-table">
                    <thead>
                        <tr>
                            <th>Position / Leistung</th>
                            <th style="text-align: right;">Einzelpreis</th>
                        </tr>
                    </thead>
                    <tbody id="items"></tbody>
                </table>

                <div class="total-box">
                    GESAMTSUMME: <span id="total">0</span> EUR
                </div>
            </div>
        </div>
    </div>
</div>

<div class="footer-bar no-print">
    C-Agrar.Julian Taxi Köln NRW RP
</div>

<a href="https://github.com/AgrarJulian/agrarjulian.github.io/issues/new" 
   target="_blank" 
   class="feedback-btn no-print">
    <span>📢</span> Feedback & Hilfe
</a>

<script>
    const config = {
        's-klasse': { base: [12000, 22000, 30000], time: 8000, stop: 3000, out: 10000, minSpontan: 8000, minKol: 10000 },
        'stretch':  { base: [22000, 40000, 50000], time: 12000, stop: 5000, out: 15000, minSpontan: 12000, minKol: 15000 },
        'patriot':  { base: [35000, 50000, 60000], time: 15000, stop: 6000, out: 20000, minSpontan: 15000, minKol: 20000 }
    };

    function calc() {
        const carKey = document.getElementById('car').value;
        const typeIdx = document.getElementById('type').value;
        const extraTime = parseInt(document.getElementById('time').value) || 0;
        const extraStops = parseInt(document.getElementById('stops').value) || 0;
        
        const isOut = document.getElementById('outside').checked;
        const isSpontan = document.getElementById('spontan').checked;
        const isKol = document.getElementById('kolonne').checked;

        const p = config[carKey];
        let total = 0;
        let html = '';

        const bPrice = p.base[typeIdx];
        const carLabel = document.getElementById('car').options[document.getElementById('car').selectedIndex].text;
        const typeLabel = document.getElementById('type').options[document.getElementById('type').selectedIndex].text;
        total += bPrice;
        html += `<tr><td><strong>Grundpreis:</strong> ${carLabel} (${typeLabel})</td><td style="text-align: right;">${bPrice.toLocaleString()} EUR</td></tr>`;

        if(extraTime > 0) {
            let cost = extraTime * p.time;
            total += cost;
            html += `<tr><td>Zusatzzeit (${extraTime} x 15 Min)</td><td style="text-align: right;">${cost.toLocaleString()} EUR</td></tr>`;
        }

        if(extraStops > 0) {
            let cost = extraStops * p.stop;
            total += cost;
            html += `<tr><td>Zusätzliche Stopps (${extraStops})</td><td style="text-align: right;">${cost.toLocaleString()} EUR</td></tr>`;
        }

        if(isOut) {
            total += p.out;
            html += `<tr><td>Pauschale außerhalb Kerngebiet</td><td style="text-align: right;">${p.out.toLocaleString()} EUR</td></tr>`;
        }

        if(isSpontan) {
            let sur = Math.max(total * 0.25, p.minSpontan);
            total += sur;
            html += `<tr><td>Aufschlag Spontanbuchung</td><td style="text-align: right;">${sur.toLocaleString()} EUR</td></tr>`;
        }

        if(isKol) {
            let sur = Math.max(total * 0.20, p.minKol);
            total += sur;
            html += `<tr><td>Aufschlag Kolonnenfahrt</td><td style="text-align: right;">${sur.toLocaleString()} EUR</td></tr>`;
        }

        document.getElementById('items').innerHTML = html;
        document.getElementById('total').innerText = total.toLocaleString();
        document.getElementById('date').innerText = new Date().toLocaleDateString('de-DE');
    }

    calc();
</script>

</body>
</html>
