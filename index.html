<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiRechner | Taxi Köln</title>
    <style>
        :root {
            --taxi-yellow: #ffcc00;
            --taxi-black: #121212;
            --taxi-dark-gray: #1e1e1e;
            --taxi-deep-black: #000000;
            --text-light: #ffffff;
            --text-dark: #000000;
            --accent-gray: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--taxi-black);
            color: var(--text-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        .main-content {
            display: flex;
            justify-content: center;
            padding: 20px;
            flex-grow: 1;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background-color: var(--taxi-dark-gray);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #333;
        }

        .header-bar {
            background-color: var(--taxi-yellow);
            color: var(--text-dark);
            padding: 0; 
            text-align: center;
            overflow: hidden; 
        }

        .logo-image {
            width: 100%; 
            height: auto; 
            display: block;
            object-fit: cover; 
        }

        .header-bar h1 {
            display: none;
        }

        .content {
            padding: 30px;
        }

        /* Formular Styling */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--taxi-yellow);
            font-weight: bold;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .checkbox-container {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 15px;
        }

        .checkbox-item input {
            width: auto;
            margin-right: 12px;
        }

        /* --- VERBESSERTE RECHNUNG --- */
        #invoice {
            margin-top: 40px;
            background: white;
            color: #333;
            padding: 50px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
        }

        .invoice-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .invoice-brand {
            color: var(--taxi-deep-black);
        }

        .invoice-title {
            text-align: right;
        }

        .invoice-title h2 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 2px;
            color: #000;
        }

        .invoice-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .invoice-table th {
            text-align: left;
            background-color: var(--accent-gray);
            padding: 12px;
            font-size: 13px;
            text-transform: uppercase;
            color: #666;
            border-bottom: 2px solid #ddd;
        }

        .invoice-table td {
            padding: 15px 12px;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }

        .invoice-table tr:last-child td {
            border-bottom: none;
        }

        .total-section {
            display: flex;
            justify-content: flex-end;
            border-top: 2px solid #000;
            padding-top: 20px;
        }

        .total-box {
            text-align: right;
            min-width: 200px;
        }

        .total-label {
            font-size: 14px;
            text-transform: uppercase;
            color: #888;
        }

        .total-amount {
            font-size: 32px;
            font-weight: 800;
            color: #000;
            display: block;
        }

        /* Buttons & Footer */
        .btn-print {
            background: var(--taxi-yellow);
            color: black;
            border: none;
            padding: 18px;
            width: 100%;
            font-weight: bold;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-print:hover {
            background: #ffffff;
            box-shadow: 0 0 15px var(--taxi-yellow);
        }

        .footer-bar {
            background-color: var(--taxi-deep-black);
            color: #555;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            width: 100%;
            box-sizing: border-box;
        }

        @media print {
            .no-print, .footer-bar { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; max-width: 100%; }
            #invoice { margin: 0; padding: 0; box-shadow: none; }
            .main-content { padding: 0; }
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            #invoice { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="main-content">
    <div class="container">
        <div class="header-bar no-print">
            <img src="images/logo.png" alt="Taxi Köln Banner" class="logo-image">
        </div>

        <div class="content">
            <div class="no-print">
                <div class="grid">
                    <div class="input-group">
                        <label>Fahrzeugmodell</label>
                        <select id="car" onchange="calc()">
                            <option value="s-klasse">Extended S-Klasse</option>
                            <option value="stretch">Stretch-Limousine</option>
                            <option value="patriot">Patriot Limousine</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Fahrt-Modus</label>
                        <select id="type" onchange="calc()">
                            <option value="0">Einfache Fahrt</option>
                            <option value="1">Hin- und Rückfahrt</option>
                            <option value="2">1 Stunde exklusiv</option>
                        </select>
                    </div>
                </div>

                <div class="grid">
                    <div class="input-group">
                        <label>Zusatzzeit (Einheit: 15 Min)</label>
                        <input type="number" id="time" value="0" min="0" oninput="calc()">
                    </div>
                    <div class="input-group">
                        <label>Zusatz-Stopps (ab 4. Ziel)</label>
                        <input type="number" id="stops" value="0" min="0" oninput="calc()">
                    </div>
                </div>

                <label>Zusatzoptionen & Aufschläge</label>
                <div class="checkbox-container">
                    <label class="checkbox-item"><input type="checkbox" id="outside" onchange="calc()"> Außerhalb Kerngebiet (Pauschal)</label>
                    <label class="checkbox-item"><input type="checkbox" id="spontan" onchange="calc()"> Spontanbuchung (&lt; 3 Std. Vorlauf)</label>
                    <label class="checkbox-item"><input type="checkbox" id="kolonne" onchange="calc()"> Kolonnen- / Formationsfahrt (+20%)</label>
                </div>

                <button class="btn-print" onclick="window.print()">Rechnung drucken</button>
            </div>

            <div id="invoice">
                <div class="invoice-head">
                    <div class="invoice-brand">
                        <strong style="font-size: 20px; color: #000;">Taxi Köln</strong><br>
                        <span style="font-size: 13px; color: #666;">Chauffeur- & Limousinenservice</span>
                    </div>
                    <div class="invoice-title">
                        <h2>RECHNUNG</h2>
                        <span style="font-size: 13px; color: #666;">Datum: <span id="date">--.--.----</span></span>
                    </div>
                </div>

                <table class="invoice-table">
                    <thead>
                        <tr>
                            <th>Beschreibung der Leistung</th>
                            <th style="text-align: right;">Betrag</th>
                        </tr>
                    </thead>
                    <tbody id="items"></tbody>
                </table>

                <div class="total-section">
                    <div class="total-box">
                        <span class="total-label">Gesamtbetrag</span>
                        <span class="total-amount"><span id="total">0</span> EUR</span>
                    </div>
                </div>
                
                <div style="margin-top: 50px; font-size: 11px; color: #999; text-align: center; border-top: 1px solid #eee; padding-top: 10px;">
                    Vielen Dank für Ihren Auftrag. Der Betrag ist nach Erhalt der Rechnung fällig.
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer-bar no-print">
    &copy; 2024 Taxi Köln NRW. Alle Rechte vorbehalten.
</footer>

<script>
    const config = {
        's-klasse': { base: [12000, 22000, 30000], time: 8000, stop: 3000, out: 10000, minSpontan: 8000, minKol: 10000 },
        'stretch':  { base: [22000, 40000, 50000], time: 12000, stop: 5000, out: 15000, minSpontan: 12000, minKol: 15000 },
        'patriot':  { base: [35000, 50000, 60000], time: 15000, stop: 6000, out: 20000, minSpontan: 15000, minKol: 20000 }
    };

    function calc() {
        const carKey = document.getElementById('car').value;
        const typeIdx = document.getElementById('type').value;
        const extraTime = parseInt(document.getElementById('time').value) || 0;
        const extraStops = parseInt(document.getElementById('stops').value) || 0;
        
        const isOut = document.getElementById('outside').checked;
        const isSpontan = document.getElementById('spontan').checked;
        const isKol = document.getElementById('kolonne').checked;

        const p = config[carKey];
        let total = 0;
        let html = '';

        const bPrice = p.base[typeIdx];
        const carLabel = document.getElementById('car').options[document.getElementById('car').selectedIndex].text;
        const typeLabel = document.getElementById('type').options[document.getElementById('type').selectedIndex].text;
        
        total += bPrice;
        html += `<tr><td><strong>Grundpauschale</strong><br><small>${carLabel} | ${typeLabel}</small></td><td style="text-align: right;">${bPrice.toLocaleString()} EUR</td></tr>`;

        if(extraTime > 0) {
            let cost = extraTime * p.time;
            total += cost;
            html += `<tr><td>Zusatzzeit (${extraTime} x 15 Min)</td><td style="text-align: right;">${cost.toLocaleString()} EUR</td></tr>`;
        }

        if(extraStops > 0) {
            let cost = extraStops * p.stop;
            total += cost;
            html += `<tr><td>Zusätzliche Zwischenstopps (${extraStops})</td><td style="text-align: right;">${cost.toLocaleString()} EUR</td></tr>`;
        }

        if(isOut) {
            total += p.out;
            html += `<tr><td>Anfahrtspauschale (außerhalb Kerngebiet)</td><td style="text-align: right;">${p.out.toLocaleString()} EUR</td></tr>`;
        }

        if(isSpontan) {
            let sur = Math.max(total * 0.25, p.minSpontan);
            total += sur;
            html += `<tr><td>Servicegebühr Spontanbuchung</td><td style="text-align: right;">${sur.toLocaleString()} EUR</td></tr>`;
        }

        if(isKol) {
            let sur = Math.max(total * 0.20, p.minKol);
            total += sur;
            html += `<tr><td>Aufschlag Kolonnenfahrt / Begleitfahrzeuge</td><td style="text-align: right;">${sur.toLocaleString()} EUR</td></tr>`;
        }

        document.getElementById('items').innerHTML = html;
        document.getElementById('total').innerText = total.toLocaleString();
        document.getElementById('date').innerText = new Date().toLocaleDateString('de-DE');
    }

    calc();
</script>

</body>
</html>
